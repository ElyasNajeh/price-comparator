<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PriceLens</title>

    <link rel="stylesheet" href="./assets/styles/main.css">

</head>

<body>

    <header class="header">

        <div class="container header-content">

            <div class="logo">

                <div class="logo-box">
                    P
                </div>

                <div class="logo-text">

                    <h2>PriceLens</h2>

                    <p>Price Comparison</p>

                </div>

            </div>


            <button class="primary-btn">

                Get Started

            </button>

        </div>

    </header>


    <section class="hero">

        <div class="container">

            <div class="hero-badge">

                ⚡ Compare prices across the web instantly

            </div>


            <h1 class="hero-title">

                Find the Best Deals<br>
                Across All Stores

            </h1>


            <p class="hero-description">

                Search products and compare prices from multiple
                online stores in seconds.

            </p>

            <div class="search-box">

                <input type="text" class="search-input" id="searchInput" placeholder="Search for products...">

                <select class="currency-select" id="currencySelect">

                    <option value="USD">$ USD</option>

                    <option value="ILS">₪ ILS</option>

                    <option value="JOD">JD JOD</option>

                    <option value="EUR">€ EUR</option>

                </select>

                <button class="primary-btn search-btn" id="searchBtn">

                    Search

                </button>

            </div>


            <div class="popular-searches">

                <span class="popular-label">

                    Popular:

                </span>

                <button class="popular-tag">

                    iPhone 15

                </button>

                <button class="popular-tag">

                    Playstation 5

                </button>

                <button class="popular-tag">

                    MacBook Air

                </button>

            </div>

        </div>

    </section>


    <!-- RESULTS -->
    <section class="results-section">

        <div class="container">

            <div class="results-header">

                <h2>

                    Search Results

                </h2>

                <p>

                    Compare prices from multiple stores

                </p>

            </div>


            <div class="results-grid" id="resultsGrid">

            </div>

        </div>

    </section>


    <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
